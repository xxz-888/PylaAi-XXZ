# Fill this file to import current brawler trophies from the official Brawl Stars API.
# Create an API token at https://developer.brawlstars.com/ and allow your current public IP.

player_tag = "#YOURTAG"
timeout_seconds = 15

# Auto-refresh mode for changing public IPs.
# When enabled, PylaAi-XXZ logs in to the official developer portal, gets your current public IP,
# deletes previous PylaAi-XXZ-created keys, creates a fresh key for that IP, and saves api_token.
auto_refresh_token = true
developer_email = ""
developer_password = ""
public_ip_service = "https://api.ipify.org"
key_name_prefix = "PylaAi-XXZ Auto"
key_description = "Auto-generated by PylaAi-XXZ for the current public IP."
delete_old_auto_tokens = true

# Dangerous: only set this true if you want PylaAi-XXZ to delete every API key on your developer account.
delete_all_tokens = false
last_public_ip = ""
api_token = ""
